[env]
_.file = ".env"
HK_MISE = 1

[tools]
go = "1.22"
goreleaser = "2.15.4"
hk = "1.44.2"
pkl = "0.31.1"

[settings]
experimental = true

[hooks]
postinstall = "hk install --mise"

[tasks.build]
description = "Build the binary"
run = "go build -o bin/macform main.go"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.clean]
description = "Remove build artifacts"
run = "rm -rf bin/"

[tasks.plan]
description = "Run macform plan"
depends = ["build"]
run = "bin/macform plan"

[tasks.apply]
description = "Run macform apply"
depends = ["build"]
run = "bin/macform apply"
