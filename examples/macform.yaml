# macform.yaml — annotated reference configuration
#
# This file documents every supported setting with its description, type,
# valid values, and macOS system default. Copy this file to your project root
# (or home directory) as macform.yaml and customise to taste.

dock:
  # Description: Auto-hide the Dock when the pointer is not near it
  # Type: bool
  # Default: false
  autohide: false

  # Description: Icon size in pixels for items in the Dock
  # Type: int
  # Default: 48
  tile-size: 48

  # Description: Position of the Dock on the screen
  # Type: string
  # Valid values: bottom | left | right
  # Default: bottom
  orientation: bottom

  # Description: Minimize windows into their application icon instead of the Dock
  # Type: bool
  # Default: false
  minimize-to-application: false

  # Description: Show recently opened applications in the Dock
  # Type: bool
  # Default: true
  show-recents: true

  # Description: Enable Dock icon magnification when the pointer hovers over it
  # Type: bool
  # Default: false
  magnification: false

  # Description: Maximum icon size in pixels when magnification is active
  # Type: int
  # Default: 128
  large-size: 128

  # Description: Animation effect used when minimizing windows
  # Type: string
  # Valid values: genie | scale | suck
  # Default: genie
  min-effect: genie

  # Description: Enable scroll-to-open for Dock items, scroll up on a Dock icon to show all Space's opened windows
  # Type: bool
  # Default: false
  scroll-to-open: false

finder:
  # Description: Show hidden files and folders (those whose names start with a dot)
  # Type: bool
  # Default: false
  show-hidden-files: false

  # Description: Always show file name extensions in the Finder
  # Type: bool
  # Default: false
  show-extensions: false

  # Description: Show the path bar at the bottom of Finder windows
  # Type: bool
  # Default: false
  show-path-bar: false

  # Description: Show the status bar at the bottom of Finder windows
  # Type: bool
  # Default: false
  show-status-bar: false

  # Description: Default view style for new Finder windows
  # Type: string
  # Valid values: icon | list | column | gallery
  # Default: icon
  default-view-style: icon

  # Description: Target folder for new Finder windows
  # Type: string
  # Valid values: recents | home | desktop | documents | computer | volumes | icloud-drive
  # Default: recents
  new-window-target: recents

  # Description: Show a warning dialog when changing a file's extension
  # Type: bool
  # Default: true
  warn-on-extension-change: true

display:
  # Description: Automatically adjust display brightness based on ambient light
  # Type: bool
  # Default: true
  auto-brightness: true

battery:
  # Description: Slightly dim the display when on battery power
  # Type: bool
  # Default: true
  slightly-dim-on-battery: true

control-center:
  # Description: Show the battery icon in the menu bar
  # Type: bool
  # Default: true
  show-battery: true

  # Description: Show battery percentage in the menu bar
  # Type: bool
  # Default: false
  show-battery-percentage: false

  # Description: Show the Bluetooth icon in the menu bar
  # Type: bool
  # Default: false
  show-bluetooth: false

  # Description: Show the Sound icon in the menu bar
  # Type: string
  # Valid values: always | when-active | never
  # Default: when-active
  show-sound: when-active

  # Description: Show the Spotlight icon in the menu bar
  # Type: bool
  # Default: true
  show-spotlight: true

  # Description: Show the Wi-Fi icon in the menu bar
  # Type: bool
  # Default: true
  show-wifi: true

  # Description: Show seconds in the menu bar clock
  # Type: bool
  # Default: false
  clock-show-seconds: false

  # Description: Show the day of the week in the menu bar clock
  # Type: bool
  # Default: true
  clock-show-day-of-week: true

trackpad:
  # Description: Enable tap to click on the trackpad
  # Type: bool
  # Default: false
  tap-to-click: false

  # Description: Trackpad tracking speed
  # Type: float
  # Valid values: 0.0 (slowest) to 3.0 (fastest)
  # Default: 0.875
  tracking-speed: 0.875

  # Description: Dragging style. When set, this will also enable the "Use trackpad for dragging" toggle.
  # Type: string
  # Valid values: with-drag-lock | without-drag-lock | three-finger-drag
  # Default: with-drag-lock
  dragging-style: without-drag-lock

keyboard:
  # Description: Key repeat rate
  # Type: integer
  # Valid values: 1 (fastest) to 120 (slowest)
  # Default: 5
  repeat-rate: 5

  # Description: Delay until key repeat starts
  # Type: integer
  # Valid values: 10 (shortest) to 120
  # Default: 35
  repeat-delay: 35

  # Description: Behavior of the function keys (F1, F2, etc.)
  # Type: string
  # Valid values: special | standard
  # Default: special
  function-keys: special

  # Description: Action performed when pressing the Fn / Globe key
  # Type: string
  # Valid values: do-nothing | change-input-source | show-emoji | start-dictation
  # Default: show-emoji
  function-key-action: show-emoji

  # Description: Automatically capitalize the first letter of sentences
  # Type: bool
  # Default: true
  auto-capitalize: true

  # Description: Automatically correct spelling errors
  # Type: bool
  # Default: true
  auto-correct: true

  # Description: Enable press-and-hold for keys to show accented character options
  # Type: bool
  # Default: true
  press-and-hold: true

  # Description: Automatically replace double hyphens and other dash sequences with em/en dashes
  # Type: bool
  # Default: true
  smart-dashes: true

hot-corners:
  # Description: Action triggered when the cursor reaches the top-left corner of the screen
  # Type: string
  # Valid values: no-op | mission-control | application-windows | desktop | start-screen-saver | disable-screen-saver | dashboard | put-display-to-sleep | launchpad | notification-center | lock-screen | quick-note
  # Default: no-op
  top-left: no-op

  # Description: Modifier key that must be held to trigger the top-left corner action
  # Type: string
  # Valid values: none | shift | control | option | command
  # Default: none
  top-left-modifier: none

  # Description: Action triggered when the cursor reaches the top-right corner of the screen
  # Type: string
  # Valid values: no-op | mission-control | application-windows | desktop | start-screen-saver | disable-screen-saver | dashboard | put-display-to-sleep | launchpad | notification-center | lock-screen | quick-note
  # Default: no-op
  top-right: no-op

  # Description: Modifier key that must be held to trigger the top-right corner action
  # Type: string
  # Valid values: none | shift | control | option | command
  # Default: none
  top-right-modifier: none

  # Description: Action triggered when the cursor reaches the bottom-left corner of the screen
  # Type: string
  # Valid values: no-op | mission-control | application-windows | desktop | start-screen-saver | disable-screen-saver | dashboard | put-display-to-sleep | launchpad | notification-center | lock-screen | quick-note
  # Default: no-op
  bottom-left: no-op

  # Description: Modifier key that must be held to trigger the bottom-left corner action
  # Type: string
  # Valid values: none | shift | control | option | command
  # Default: none
  bottom-left-modifier: none

  # Description: Action triggered when the cursor reaches the bottom-right corner of the screen
  # Type: string
  # Valid values: no-op | mission-control | application-windows | desktop | start-screen-saver | disable-screen-saver | dashboard | put-display-to-sleep | launchpad | notification-center | lock-screen | quick-note
  # Default: quick-note
  bottom-right: quick-note

  # Description: Modifier key that must be held to trigger the bottom-right corner action
  # Type: string
  # Valid values: none | shift | control | option | command
  # Default: none
  bottom-right-modifier: none
