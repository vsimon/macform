version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: macform
    binary: macform
    main: .
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/vsimon/macform/cmd.version={{.Version}}
      - -X github.com/vsimon/macform/cmd.commit={{.Commit}}
      - -X github.com/vsimon/macform/cmd.date={{.Date}}

archives:
  - id: macform
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

homebrew_casks:
  - name: macform
    repository:
      owner: vsimon
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/vsimon/macform
    description: Declarative macOS system settings management
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"

signs:
  - artifacts: binary
    cmd: bash
    args:
      - scripts/release/sign-and-notarize.sh
      - "${artifact}"
    env:
      - APPLE_SIGNING_IDENTITY={{ .Env.APPLE_SIGNING_IDENTITY }}
      - APPLE_API_KEY={{ .Env.APPLE_API_KEY }}
      - APPLE_API_KEY_ID={{ .Env.APPLE_API_KEY_ID }}
      - APPLE_API_ISSUER={{ .Env.APPLE_API_ISSUER }}
